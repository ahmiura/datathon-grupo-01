name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
        
    - name: Run Quality Gate (Pytest & Coverage)
      # Garante que a PR seja bloqueada se a cobertura cair abaixo de 60% (Requisito GAP 04)
      run: |
        poetry run pytest tests/ --cov=src --cov-fail-under=60