name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:20.10.16
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Build and start containers
        run: |
          docker compose up --build -d

      - name: Wait for services
        run: |
          sleep 20

      - name: Run tests inside api container
        run: |
          docker compose exec -T api python -m pytest -q --maxfail=1 --disable-warnings

      - name: Shut down
        if: always()
        run: |
          docker compose down --volumes
name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
        
    - name: Run Quality Gate (Pytest & Coverage)
      # Garante que a PR seja bloqueada se a cobertura cair abaixo de 60% (Requisito GAP 04)
      run: |
        poetry run pytest tests/ --cov=src --cov-fail-under=60